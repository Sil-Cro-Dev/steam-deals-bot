name: Steam Deals Daily

on:
  schedule:
    # Ogni giorno alle 09:00 ora italiana (07:00 UTC in ora legale)
    - cron: "0 7 * * *"

  # Permette di avviare il workflow manualmente da GitHub
  workflow_dispatch:

jobs:
  send-deals:
    runs-on: ubuntu-latest

    # Permessi per committare message_ids.json nel repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run bot (daily mode)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py daily

      - name: Salva message_ids.json nel repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add message_ids.json
          git diff --staged --quiet || git commit -m "chore: aggiorna message_ids [skip ci]"
          git push
